<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bamboozled - Accuracy Checker</title>
<style>
:root {
    --primary-color: #1c0f2d;
    --secondary-color: #2d0359;
    --accent-color: #c4298e;
    --neon-blue: #00eaff;
    --white: #FFFFFF;
    --border-color: rgba(196, 41, 142, 0.3);
    --text-primary: #FFFFFF;
    --text-secondary: rgba(255, 255, 255, 0.7);
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
@import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap");
@import url("https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&display=swap");
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Exo 2", sans-serif; user-select: none; }
body { background-color: var(--primary-color); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-primary); padding: 20px; overflow-x: hidden; }
.container { width: 90%; max-width: 1000px; background: rgba(20,20,20,0.8); border-radius: 8px; padding: 30px; box-shadow: 0 0 30px rgba(0,234,255,0.3); border: 1px solid var(--neon-blue); }
.page-title { font-family: "Orbitron", sans-serif; font-size: 75px; font-weight: 900; background: linear-gradient(90deg, var(--neon-blue), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }
.file-input-wrapper { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
#file-input { display: none; }
.file-upload-label { background: rgba(45,3,89,0.2); border: 2px dashed var(--neon-blue); border-radius: 6px; padding: 15px 30px; color: var(--neon-blue); cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 10px; }
.file-upload-label:hover { background: rgba(0,234,255,0.1); border-color: var(--accent-color); }
.controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
button { background: linear-gradient(135deg, var(--secondary-color), var(--accent-color)); color: var(--white); border: none; border-radius: 30px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; font-family: "Orbitron", sans-serif; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,234,255,0.4); display: flex; align-items: center; gap: 10px; }
button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,234,255,0.6); }
.leaderboard-section { background: rgba(45,3,89,0.2); border-radius: 6px; padding: 20px; max-height: 400px; overflow-y: auto; }
.leaderboard-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
.leaderboard-table th { background: rgba(0,234,255,0.2); color: var(--neon-blue); padding: 12px; text-align: left; font-family: "Orbitron", sans-serif; text-transform: uppercase; letter-spacing: 1px; }
.leaderboard-table td { background: rgba(20,20,20,0.5); padding: 12px; color: var(--white); border-bottom: 2px solid rgba(0,234,255,0.2); }
.leaderboard-table tr:hover td { background: rgba(0,234,255,0.1); }
footer { margin-top: 20px; color: var(--text-secondary); text-align: center; font-size: 12px; }
@media (max-width: 768px) { .page-title { font-size: 40px; } .controls { flex-direction: column; gap: 10px; } }
</style>
</head>
<body>
<h1 class="page-title">Accuracy Checker 🚀</h1>
<div class="container">
    <div class="file-input-wrapper">
        <input type="file" id="file-input" multiple accept=".txt">
        <label for="file-input" class="file-upload-label">Upload Solution Files</label>
    </div>
    <div class="controls">
        <button onclick="processFiles()">Check Accuracy</button>
        <button onclick="downloadCSV()">Download CSV</button>
        <button onclick="downloadTXT()">Download TXT</button>
    </div>
    <div class="leaderboard-section">
        <table class="leaderboard-table" id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Participant</th>
                    <th>Accuracy (%)</th>
                    <th>Time Taken</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<footer>&copy; 2025 Bamboozled Team. All rights reserved.</footer>

<script>
let uploadedResults = [];

// Process uploaded files
function processFiles() {
    const files = document.getElementById("file-input").files;
    if (!files.length) { alert("Please upload at least one file."); return; }
    uploadedResults = [];
    let processedFiles = 0;

    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const { name, mobile, paragraph, userText, timeTaken, clue } = parseFileContent(content);
            const accuracy = calculateAccuracy(paragraph, userText);
            uploadedResults.push({ name, mobile, paragraph, userText, timeTaken, clue, accuracy });
            processedFiles++;
            if (processedFiles === files.length) displayResults(uploadedResults);
        };
        reader.readAsText(file);
    });
}

// Parse file content
function parseFileContent(content) {
    const getSection = (header) => {
        const regex = new RegExp(`${header}[\\r\\n]+([\\s\\S]*?)(?=-----|$)`, 'i');
        const match = content.match(regex);
        return match ? match[1].trim() : "";
    };

    const nameMatch = content.match(/Name:\s*(.*)/i);
    const mobileMatch = content.match(/Mobile:\s*(.*)/i);

    return {
        name: nameMatch ? nameMatch[1].trim() : "Player",
        mobile: mobileMatch ? mobileMatch[1].trim() : "N/A",
        paragraph: getSection("----- Paragraph Given -----"),
        userText: getSection("----- User Output -----"),
        timeTaken: (content.match(/Time Taken:\s*(.*)/i) || [])[1] || "0:00",
        clue: {
            title: getSection("----- Correct Clue -----").split("|")[0]?.trim() || "N/A",
            description: getSection("----- Correct Clue -----").split("|")[1]?.trim() || "N/A"
        }
    };
}


// LCS-based paragraph accuracy
function calculateAccuracy(original, user) {
    if (!original || !user) return 0;
    original = original.trim(); user = user.trim();
    function lcs(X,Y){
        const m=X.length,n=Y.length;
        const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
        for(let i=1;i<=m;i++){
            for(let j=1;j<=n;j++){
                if(X[i-1]===Y[j-1]) dp[i][j]=dp[i-1][j-1]+1;
                else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
            }
        }
        return dp[m][n];
    }
    const lcsLength = lcs(original,user);
    return ((lcsLength/original.length)*100).toFixed(2);
}

// Display leaderboard
function displayResults(results) {
    results.sort((a,b)=>b.accuracy-a.accuracy);
    const tbody = document.getElementById("leaderboard").getElementsByTagName("tbody")[0];
    tbody.innerHTML="";
    results.forEach((r,i)=>{
        const row=tbody.insertRow();
        row.insertCell(0).innerText=i+1;
        row.insertCell(1).innerText=r.name;
        row.insertCell(2).innerText=r.accuracy+"%";
        row.insertCell(3).innerText=r.timeTaken;
    });
}

// Download CSV
function downloadCSV() {
    let csv="Rank,Participant,Accuracy (%),Time Taken\n";
    const rows=document.getElementById("leaderboard").getElementsByTagName("tbody")[0].rows;
    for(let i=0;i<rows.length;i++){
        const cells=rows[i].cells;
        csv+=`${cells[0].innerText},${cells[1].innerText},${cells[2].innerText},${cells[3].innerText}\n`;
    }
    const blob=new Blob([csv],{type:"text/csv"});
    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="Bamboozled_Results.csv";
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
}

// Download TXT files
function downloadTXT() {
    uploadedResults.forEach(r=>{
        const content = 
`===== PLAYER DETAILS =====
Name: ${r.name}
Mobile: ${r.mobile}

===== GAME DATA =====
Time Taken: ${r.timeTaken}

----- Paragraph Given -----
${r.paragraph}

----- Correct Clue -----
${r.clue.title} | ${r.clue.description}

----- User Output -----
${r.userText}

----- Accuracy -----
${r.accuracy}%`;
        const blob=new Blob([content],{type:"text/plain"});
        const link=document.createElement("a");
        link.href=URL.createObjectURL(blob);
        link.download=`${r.name}.txt`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    });
}
</script>
</body>
</html>
